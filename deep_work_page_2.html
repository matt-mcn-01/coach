<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deep Work</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text: #1a1a2e;
      --text-muted: #8888aa;
      --bg: #979797;
      --surface: #ffffff;
      --border: #dcdcec;
      --accent: #7c3aed;
      --accent-dim: #7c3aed18;
      --accent-light: #ede9fe;
      --user-bg: #ede9fe;
      --ai-bg: #f8f8fc;
      --panel-bg: #e4e4ef;
      --panel-border: #c8c8de;
      --warn: #dc2626;
      --warn-bg: #fee2e2;
      --warn-border: #fca5a5;
      --radius: 10px;
      --font-ui: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    body {
      background: url('/KCS_Arch_COPYRIGHT.jpg') center/cover no-repeat fixed, var(--bg);
      color: var(--text); font-family: var(--font-ui);
      height: 100dvh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
    }

    .page-wrapper {
      width: 100%; max-width: 720px; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 0 clamp(8px, 2vw, 16px);
      gap: clamp(6px, 1.2vh, 12px);
    }

    .section-nav { flex-shrink: 0; padding: clamp(10px, 2vh, 20px) 0 0; }
    nav { display: flex; gap: clamp(4px, 0.8vw, 8px); }
    nav a {
      background: var(--surface); flex: 1; text-align: center;
      font-family: var(--font-mono); font-size: clamp(9px, 1.2vw, 11px); font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none;
      padding: clamp(5px, 0.8vh, 7px) clamp(4px, 1vw, 14px);
      border-radius: 6px; border: 1px solid var(--border);
      color: var(--text-muted); transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    nav a:hover  { color: var(--text); border-color: #aaa; }
    nav a.active { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }

    /* ── Centre-fill content ── */
    .section-content {
      flex: 1; min-height: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: clamp(6px, 1.2vh, 16px);
      padding: clamp(14px, 2vh, 22px);
      display: flex; flex-direction: column;
      gap: clamp(10px, 1.4vh, 16px);
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* ── Page header ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; flex-shrink: 0;
    }
    .page-title {
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text);
    }

    /* ── Insight cards ── */
    .insight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
      flex-shrink: 0;
    }
    .card-header {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 10px;
    }
    .card-title {
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .card-headline {
      font-size: 13px; color: var(--text); font-weight: 400; line-height: 1.4;
    }
    .card-headline strong { color: var(--accent); font-weight: 500; }
    .card-headline.warn strong { color: var(--warn); }

    /* ── Scenario badge ── */
    .scenario-badge {
      font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: .06em; padding: 3px 7px; border-radius: 4px;
      flex-shrink: 0;
    }
    .scenario-badge.overloaded { color: var(--warn); background: var(--warn-bg); border: 1px solid var(--warn-border); }
    .scenario-badge.balanced   { color: var(--accent); background: var(--accent-light); border: 1px solid #c4b5fd; }
    .scenario-badge.isolated   { color: #d97706; background: #fef3c7; border: 1px solid #fcd34d; }

    /* ── Focus calendar SVG axes/labels ── */
    .calendar-axis {
      font-family: var(--font-mono); font-size: 9px; fill: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .calendar-cell-meeting { fill: var(--accent); }
    .calendar-cell-focus   { fill: #c4b5fd; }
    .calendar-cell-empty   { fill: #f5f5fb; stroke: var(--border); stroke-width: 0.5; }

    /* ── Bar comparison ── */
    .bar-row {
      display: grid;
      grid-template-columns: 80px 1fr 60px;
      align-items: center; gap: 10px;
    }
    .bar-row-label {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .bar-row-value {
      font-family: var(--font-mono); font-size: 11px; color: var(--text);
      font-weight: 500; text-align: right;
    }
    .bar-track-lg {
      height: 14px; background: var(--accent-light); border-radius: 3px;
      overflow: hidden; position: relative;
    }
    .bar-fill-lg {
      height: 100%; transition: width .55s ease;
      border-radius: 3px;
    }
    .bar-fill-lg.meeting { background: var(--accent); }
    .bar-fill-lg.focus   { background: #a78bfa; }
    .bar-fill-lg.warn    { background: var(--warn); }

    /* ── Density meter ── */
    .density-meter {
      display: flex; gap: 3px; align-items: center;
      flex-wrap: wrap;
    }
    .density-cell {
      width: 16px; height: 22px; border-radius: 2px;
      background: var(--accent-light);
      transition: background .25s ease;
    }
    .density-cell.on { background: var(--accent); }
    .density-cell.warn { background: var(--warn); }

    /* ── Callout ── */
    .callout {
      display: flex; align-items: center; gap: 12px;
      background: var(--accent-light);
      border: 1px solid #c4b5fd;
      border-radius: 6px;
      padding: 10px 14px;
    }
    .callout.warn {
      background: var(--warn-bg);
      border-color: var(--warn-border);
    }
    .callout-num {
      font-family: var(--font-mono); font-size: 22px; font-weight: 500;
      color: var(--accent); line-height: 1;
    }
    .callout.warn .callout-num { color: var(--warn); }
    .callout-text {
      font-size: 12px; color: var(--text); line-height: 1.4;
    }

    /* ── Floating chat — bottom-right ── */
    @keyframes fc-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes fc-blink { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
    .fc-wrap { display:flex; flex-direction:column; gap:2px; }
    .fc-wrap.user { align-self:flex-end; align-items:flex-end; }
    .fc-wrap.ai   { align-self:flex-start; align-items:flex-start; }
    .fc-label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); padding:0 2px; }
    .fc-msg { font-size:12px; line-height:1.5; padding:7px 10px; border-radius:6px; border:1px solid var(--border); max-width:90%; }
    .fc-msg.user { background:var(--user-bg); border-color:#c4b5fd; color:var(--text); }
    .fc-msg.ai   { background:var(--surface); color:var(--text); }
    #fc-input:focus { border-color:var(--accent) !important; }
    #fc-send:hover  { opacity:0.85; }
    #fc-send:disabled { opacity:0.35; cursor:not-allowed; }
    #fc-panel.open { max-height: calc(50dvh - 78px) !important; }

    @media (max-width: 480px) {
      nav a { font-size: 9px; padding: 5px 4px; }
      #fc-bar, #fc-panel { width:calc(100% - 32px); right:16px; }
      .bar-row { grid-template-columns: 70px 1fr 50px; gap: 8px; }
    }
  </style>

  <!-- ══ Shared scenario module (PR1) ══ -->
  <script src="/scenario.js"></script>
</head>
<body>
  <div class="page-wrapper">
    <div class="section-nav">
      <nav>
        <a href="index.html">Dashboard</a>
        <a href="deep_work_page_2.html" class="active">Deep Work</a>
        <a href="network_page_3.html">Network</a>
        <a href="career_path_page_4.html">Career Path</a>
        <a href="settings_page_5.html">Settings</a>
      </nav>
    </div>

    <div class="section-content">

      <div class="page-header">
        <span class="page-title">Deep Work — Past 7 Days</span>
        <span class="scenario-badge" id="dw-scenario">—</span>
      </div>

      <!-- ── 1. Focus Calendar ── -->
      <div class="insight-card">
        <div class="card-header">
          <span class="card-title">Focus Calendar</span>
          <span class="card-title" style="color:var(--accent);">M T W T F</span>
        </div>
        <div class="card-headline" id="dw-cal-headline">—</div>
        <svg id="dw-calendar" viewBox="0 0 600 200" preserveAspectRatio="xMidYMid meet"
             style="width:100%; height:auto; max-height:220px;">
        </svg>
      </div>

      <!-- ── 2. Focus vs Meeting Hours ── -->
      <div class="insight-card">
        <div class="card-header">
          <span class="card-title">Time Allocation</span>
          <span class="card-title">% of 9–5 week</span>
        </div>
        <div class="bar-row">
          <span class="bar-row-label">Meetings</span>
          <div class="bar-track-lg"><div class="bar-fill-lg meeting" id="dw-bar-meet" style="width:0%"></div></div>
          <span class="bar-row-value" id="dw-bar-meet-val">—</span>
        </div>
        <div class="bar-row">
          <span class="bar-row-label">Focus</span>
          <div class="bar-track-lg"><div class="bar-fill-lg focus" id="dw-bar-focus" style="width:0%"></div></div>
          <span class="bar-row-value" id="dw-bar-focus-val">—</span>
        </div>
        <div class="card-headline" id="dw-bar-headline">—</div>
      </div>

      <!-- ── 3. Back-to-back density ── -->
      <div class="insight-card">
        <div class="card-header">
          <span class="card-title">Back-to-Back Density</span>
          <span class="card-title">≤ 5 min between</span>
        </div>
        <div class="density-meter" id="dw-density"></div>
        <div class="card-headline" id="dw-density-headline">—</div>
      </div>

      <!-- ── 4. Longest focus block callout ── -->
      <div class="callout" id="dw-callout">
        <span class="callout-num" id="dw-callout-num">—</span>
        <span class="callout-text" id="dw-callout-text">—</span>
      </div>

    </div>
  </div>

  <!-- ══ Floating Coach Chat (bottom-right) — unchanged from PR1 ══ -->
  <div id="fc-bar" style="
    position:fixed; bottom:16px; right:16px; width:240px; height:38px;
    background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:8px;
    display:flex; align-items:center; gap:8px; padding:0 12px;
    cursor:pointer; z-index:1000; user-select:none;
    box-shadow:0 2px 8px rgba(0,0,0,0.10);
  " onclick="fcToggle()">
    <div id="fc-status-dot" style="width:6px;height:6px;border-radius:50%;background:#f87171;box-shadow:0 0 6px #f87171;animation:fc-pulse 2s ease-in-out infinite;flex-shrink:0;transition:background 0.3s,box-shadow 0.3s;"></div>
    <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Coach</span>
    <span id="fc-chevron" style="margin-left:auto;font-size:10px;color:var(--text-muted);transition:transform 0.2s;">▲</span>
  </div>

  <div id="fc-panel" style="
    position:fixed; bottom:62px; right:16px; width:240px; max-height:0; overflow:hidden;
    background:transparent; border:1px solid transparent; border-radius:8px;
    z-index:999; transition:max-height 0.28s ease, border-color 0.28s ease, background 0.28s ease;
    display:flex; flex-direction:column;
  ">
    <div style="padding:10px 12px;border-bottom:1px solid var(--panel-border);display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <div id="fc-panel-dot" style="width:6px;height:6px;border-radius:50%;background:#f87171;box-shadow:0 0 6px #f87171;animation:fc-pulse 2s ease-in-out infinite;transition:background 0.3s,box-shadow 0.3s;"></div>
      <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Coaching Agent</span>
    </div>
    <div id="fc-messages" style="overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;flex:1;scrollbar-width:thin;scrollbar-color:var(--border) transparent;"></div>
    <div style="padding:8px 12px;border-top:1px solid var(--panel-border);display:flex;gap:6px;align-items:flex-end;flex-shrink:0;">
      <textarea id="fc-input" rows="1" placeholder="Message…" style="flex:1;background:var(--panel-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-ui);font-size:12px;padding:8px 10px;resize:none;min-height:34px;max-height:80px;outline:none;transition:border-color 0.2s;line-height:1.4;"></textarea>
      <button id="fc-send" style="background:var(--accent);border:none;border-radius:6px;color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:500;padding:0 12px;height:34px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity 0.2s;">Send</button>
    </div>
  </div>

  <script>
  // ════════════════════════════════════════════════════════════════════════════
  // Deep Work page — scenario-driven SVG visuals (PR2)
  // All four panels re-render on 'scenariochanged' (fired from Settings reroll).
  // ════════════════════════════════════════════════════════════════════════════

  const WEEK_HRS = 40;

  // ── Scenario-specific narrative copy ─────────────────────────────────────
  // Each scenario gets its own headline text per panel. These aren't AI-generated;
  // they're hand-written so the demo feels coherent and FCDO-appropriate.
  const COPY = {
    overloaded: {
      cal:     'Calendar saturated with meetings. Focus time is fragmented and squeezed into edges of the day.',
      bars:    'Meetings are <strong>dominating</strong> your week. Focus time has been pushed to the margins.',
      density: '<strong>9 back-to-back meetings</strong> with little or no recovery gap. This is a sustainable-pace red flag.',
      callout: { num: '1', text: 'focus block of 60+ minutes this week. Most professionals need at least 4 to feel productive.' },
      warn:    true,
    },
    balanced: {
      cal:     'A healthy mix: meetings clustered, focus blocks protected. The shape of a sustainable week.',
      bars:    'A <strong>healthy ratio</strong> of meetings to focus time. Both have room to breathe.',
      density: '<strong>2 back-to-back occurrences</strong>, both followed by genuine recovery time.',
      callout: { num: '7', text: 'distinct focus blocks of 60+ minutes — solid scaffolding for deep work.' },
      warn:    false,
    },
    isolated: {
      cal:     'Meetings are sparse. Most of your week is unstructured time, which can be powerful but also lonely.',
      bars:    'Lots of <strong>uninterrupted focus capacity</strong>. Worth checking that key collaboration isn\'t being missed.',
      density: 'No back-to-back meetings at all. There\'s no schedule pressure, but there\'s also less spontaneous interaction.',
      callout: { num: '14', text: 'focus blocks of 60+ minutes. Outstanding for deep work; consider whether you need more touchpoints.' },
      warn:    false,
    },
  };

  // ── Focus calendar layout ───────────────────────────────────────────────
  // 5 days × 9 hourly slots (09:00–18:00). For each scenario we hand-paint
  // a representative pattern of meeting (M) / focus (F) / empty (.) cells.
  // This is data-shape-accurate to the scenario without inventing specifics.
  const CAL = {
    overloaded: [
      ['M','M','M','M','M','M','.','.','M'],
      ['M','M','M','M','M','M','M','.','.'],
      ['M','.','M','M','M','M','M','M','.'],
      ['M','M','M','M','F','M','M','M','.'],
      ['M','M','M','M','M','.','.','M','M'],
    ],
    balanced: [
      ['M','F','F','F','M','M','.','F','F'],
      ['F','F','M','M','.','F','F','.','.'],
      ['M','.','F','F','F','.','M','M','.'],
      ['F','F','M','.','F','F','F','.','M'],
      ['F','F','.','M','M','.','F','F','F'],
    ],
    isolated: [
      ['M','F','F','F','F','F','F','F','.'],
      ['.','F','F','F','F','F','F','F','F'],
      ['F','F','F','F','F','.','.','F','F'],
      ['.','F','F','F','F','F','F','F','F'],
      ['F','F','F','F','M','F','F','F','.'],
    ],
  };

  function renderCalendar(scenario) {
    const svg = document.getElementById('dw-calendar');
    const grid = CAL[scenario];
    const days = ['Mon','Tue','Wed','Thu','Fri'];
    const hours = ['9','10','11','12','13','14','15','16','17'];

    const padL = 40, padT = 22, padR = 8, padB = 10;
    const W = 600, H = 200;
    const cols = 9, rows = 5;
    const cellW = (W - padL - padR) / cols;
    const cellH = (H - padT - padB) / rows;

    let svgInner = '';

    // X-axis: hour labels at top
    hours.forEach((h, i) => {
      const x = padL + i * cellW + cellW / 2;
      svgInner += `<text class="calendar-axis" x="${x}" y="${padT - 8}" text-anchor="middle">${h}</text>`;
    });

    // Y-axis: day labels on left
    days.forEach((d, i) => {
      const y = padT + i * cellH + cellH / 2 + 4;
      svgInner += `<text class="calendar-axis" x="${padL - 6}" y="${y}" text-anchor="end">${d}</text>`;
    });

    // Cells
    grid.forEach((row, r) => {
      row.forEach((cell, c) => {
        const x = padL + c * cellW;
        const y = padT + r * cellH;
        let cls = 'calendar-cell-empty';
        if (cell === 'M') cls = 'calendar-cell-meeting';
        else if (cell === 'F') cls = 'calendar-cell-focus';
        svgInner += `<rect class="${cls}" x="${x + 1.5}" y="${y + 1.5}" width="${cellW - 3}" height="${cellH - 3}" rx="2"/>`;
      });
    });

    // Legend
    const legY = H - 4;
    svgInner += `<rect class="calendar-cell-meeting" x="${padL}" y="${legY - 8}" width="10" height="8" rx="1"/>`;
    svgInner += `<text class="calendar-axis" x="${padL + 14}" y="${legY - 1}">Meeting</text>`;
    svgInner += `<rect class="calendar-cell-focus" x="${padL + 70}" y="${legY - 8}" width="10" height="8" rx="1"/>`;
    svgInner += `<text class="calendar-axis" x="${padL + 84}" y="${legY - 1}">Focus block</text>`;
    svgInner += `<rect class="calendar-cell-empty" x="${padL + 160}" y="${legY - 8}" width="10" height="8" rx="1"/>`;
    svgInner += `<text class="calendar-axis" x="${padL + 174}" y="${legY - 1}">Unscheduled</text>`;

    svg.innerHTML = svgInner;
    document.getElementById('dw-cal-headline').innerHTML = COPY[scenario].cal;
  }

  // ── Bar chart ────────────────────────────────────────────────────────────
  function renderBars(s, scenario) {
    const meetingHrs = Math.round((s.total_meeting_mins_7d / 60) * 10) / 10;
    const meetingPct = Math.round((meetingHrs / WEEK_HRS) * 100);
    const focusPct   = Math.round((s.focus_hours_7d / WEEK_HRS) * 100);

    document.getElementById('dw-bar-meet').style.width = Math.min(meetingPct, 100) + '%';
    document.getElementById('dw-bar-meet-val').textContent = meetingPct + '%';
    document.getElementById('dw-bar-focus').style.width = Math.min(focusPct, 100) + '%';
    document.getElementById('dw-bar-focus-val').textContent = focusPct + '%';

    // Use warn colour on focus bar if it's critically low
    const focusBar = document.getElementById('dw-bar-focus');
    focusBar.classList.toggle('warn', focusPct < 20);
    focusBar.classList.toggle('focus', focusPct >= 20);

    const headline = document.getElementById('dw-bar-headline');
    headline.classList.toggle('warn', scenario === 'overloaded');
    headline.innerHTML = COPY[scenario].bars;
  }

  // ── Density meter ────────────────────────────────────────────────────────
  // 12 cells representing typical recovery slots between meetings.
  // We light up one cell per back-to-back occurrence (capped at 12).
  function renderDensity(s, scenario) {
    const wrap = document.getElementById('dw-density');
    wrap.innerHTML = '';
    const total = 12;
    const filled = Math.min(s.back_to_back_count, total);
    const isWarn = filled >= 6;
    for (let i = 0; i < total; i++) {
      const div = document.createElement('div');
      div.className = 'density-cell';
      if (i < filled) {
        div.classList.add(isWarn ? 'warn' : 'on');
      }
      wrap.appendChild(div);
    }
    document.getElementById('dw-density-headline').innerHTML = COPY[scenario].density;
  }

  // ── Callout (longest focus block) ────────────────────────────────────────
  function renderCallout(scenario) {
    const c = COPY[scenario].callout;
    const el = document.getElementById('dw-callout');
    el.classList.toggle('warn', COPY[scenario].warn);
    document.getElementById('dw-callout-num').textContent = c.num;
    document.getElementById('dw-callout-text').textContent = c.text;
  }

  // ── Scenario badge ───────────────────────────────────────────────────────
  function renderBadge(scenario) {
    const b = document.getElementById('dw-scenario');
    b.textContent = scenario;
    b.classList.remove('overloaded','balanced','isolated');
    b.classList.add(scenario);
  }

  // ── Render everything ────────────────────────────────────────────────────
  function renderAll() {
    const scenario = window.currentScenario;
    const s = window.signals;
    renderBadge(scenario);
    renderCalendar(scenario);
    renderBars(s, scenario);
    renderDensity(s, scenario);
    renderCallout(scenario);
  }
  renderAll();

  // PR1 hook: re-render on reroll
  window.addEventListener('scenariochanged', renderAll);


  // ════════════════════════════════════════════════════════════════════════
  // Floating Coach Chat — copied verbatim from PR1; only adds scenario
  // to the fetch body. No structural change.
  // ════════════════════════════════════════════════════════════════════════
  const HISTORY_KEY = 'coach_history';
  let fcHistory = JSON.parse(sessionStorage.getItem(HISTORY_KEY) || '[]');
  const fcPanel     = document.getElementById('fc-panel');
  const fcMessages  = document.getElementById('fc-messages');
  const fcInput     = document.getElementById('fc-input');
  const fcSend      = document.getElementById('fc-send');
  const fcChevron   = document.getElementById('fc-chevron');
  const fcStatusDot = document.getElementById('fc-status-dot');
  const fcPanelDot  = document.getElementById('fc-panel-dot');

  function fcSaveHistory() { sessionStorage.setItem(HISTORY_KEY, JSON.stringify(fcHistory)); }
  function fcSetConnected(on) {
    const col  = on ? 'var(--accent)' : '#f87171';
    const glow = on ? '0 0 6px var(--accent)' : '0 0 6px #f87171';
    fcStatusDot.style.background = col; fcStatusDot.style.boxShadow = glow;
    fcPanelDot.style.background  = col; fcPanelDot.style.boxShadow  = glow;
  }
  async function fcCheckConnection() {
    try {
      const res = await fetch('/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: '__ping__', history: [] }),
      });
      if (res.ok) fcSetConnected(true);
    } catch (err) { fcSetConnected(false); }
  }
  fcCheckConnection();

  function fcApplyState(open) {
    if (open) { fcPanel.classList.add('open'); }
    else { fcPanel.classList.remove('open'); fcPanel.style.maxHeight = '0'; }
    fcPanel.style.borderColor = open ? 'var(--panel-border)' : 'transparent';
    fcPanel.style.background  = open ? 'var(--panel-bg)' : 'transparent';
    fcPanel.style.boxShadow   = open ? '0 2px 8px rgba(0,0,0,0.10)' : 'none';
    fcChevron.style.transform = open ? 'rotate(180deg)' : '';
  }
  function fcRenderMessage(role, text) {
    const wrap  = document.createElement('div'); wrap.className = 'fc-wrap ' + (role === 'user' ? 'user' : 'ai');
    const label = document.createElement('div'); label.className = 'fc-label';
    label.textContent = role === 'user' ? 'You' : 'Coach';
    const msg   = document.createElement('div'); msg.className = 'fc-msg ' + (role === 'user' ? 'user' : 'ai');
    msg.textContent = text;
    wrap.appendChild(label); wrap.appendChild(msg);
    fcMessages.appendChild(wrap); fcMessages.scrollTop = fcMessages.scrollHeight;
  }
  function fcToggle() {
    fcHistory = JSON.parse(sessionStorage.getItem(HISTORY_KEY) || '[]');
    const fcOpen = sessionStorage.getItem('coach_open') !== 'false';
    const newOpen = !fcOpen;
    sessionStorage.setItem('coach_open', newOpen);
    fcApplyState(newOpen);
    if (newOpen) {
      fcMessages.innerHTML = '';
      fcHistory.forEach(m => fcRenderMessage(m.role === 'user' ? 'user' : 'ai', m.content));
      setTimeout(() => fcInput.focus(), 300);
    }
  }
  fcInput.addEventListener('input', () => {
    fcInput.style.height = 'auto';
    fcInput.style.height = Math.min(fcInput.scrollHeight, 80) + 'px';
  });
  fcInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); fcSendMessage(); }
  });
  fcSend.addEventListener('click', fcSendMessage);

  async function fcSendMessage() {
    const text = fcInput.value.trim();
    if (!text) return;
    fcInput.value = ''; fcInput.style.height = 'auto'; fcSend.disabled = true;
    fcRenderMessage('user', text);
    const typingWrap = document.createElement('div');
    typingWrap.className = 'fc-wrap ai'; typingWrap.id = 'fc-typing';
    typingWrap.innerHTML = '<div class="fc-label">Coach</div><div class="fc-msg ai" style="display:flex;gap:4px;align-items:center;"><span style="width:5px;height:5px;border-radius:50%;background:var(--accent);animation:fc-blink 1.2s ease-in-out infinite;display:inline-block;"></span><span style="width:5px;height:5px;border-radius:50%;background:var(--accent);animation:fc-blink 1.2s ease-in-out 0.2s infinite;display:inline-block;"></span><span style="width:5px;height:5px;border-radius:50%;background:var(--accent);animation:fc-blink 1.2s ease-in-out 0.4s infinite;display:inline-block;"></span></div>';
    fcMessages.appendChild(typingWrap); fcMessages.scrollTop = fcMessages.scrollHeight;
    try {
      const res = await fetch('/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          history: fcHistory,
          scenario: window.currentScenario,
        }),
      });
      const data = await res.json();
      document.getElementById('fc-typing')?.remove();
      fcSetConnected(true);
      if (data.error) { fcRenderMessage('ai', 'Error: ' + data.error); }
      else {
        fcRenderMessage('ai', data.reply);
        fcHistory.push({ role: 'user',  content: text });
        fcHistory.push({ role: 'coach', content: data.reply });
        fcSaveHistory();
      }
    } catch (err) {
      document.getElementById('fc-typing')?.remove();
      fcSetConnected(false);
      fcRenderMessage('ai', 'Could not reach the server.');
    } finally { fcSend.disabled = false; fcInput.focus(); }
  }

  const initOpen = sessionStorage.getItem('coach_open') !== 'false';
  fcApplyState(initOpen);
  if (initOpen) {
    fcHistory.forEach(m => fcRenderMessage(m.role === 'user' ? 'user' : 'ai', m.content));
  }
  </script>
</body>
</html>
