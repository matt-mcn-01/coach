<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deep Work</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text: #1a1a2e;
      --text-muted: #8888aa;
      --bg: #979797;
      --surface: #ffffff;
      --border: #dcdcec;
      --accent: #7c3aed;
      --accent-dim: #7c3aed18;
      --accent-light: #ede9fe;
      --user-bg: #ede9fe;
      --ai-bg: #f8f8fc;
      --panel-bg: #e4e4ef;
      --panel-border: #c8c8de;
      --radius: 10px;
      --font-ui: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    body {
      background: url('/KCS_Arch_COPYRIGHT.jpg') center/cover no-repeat fixed, var(--bg);
      color: var(--text); font-family: var(--font-ui);
      height: 100dvh; display: flex; flex-direction: column; align-items: center; overflow: hidden;
    }

    .page-wrapper {
      width: 100%; max-width: 720px; height: 100dvh;
      display: flex; flex-direction: column;
      padding: 0 clamp(8px, 2vw, 16px);
      gap: clamp(6px, 1.2vh, 12px);
    }

    .section-nav { flex-shrink: 0; padding: clamp(10px, 2vh, 20px) 0 0; }
    nav { display: flex; gap: clamp(4px, 0.8vw, 8px); }
    nav a {
      background: var(--surface); flex: 1; text-align: center;
      font-family: var(--font-mono); font-size: clamp(9px, 1.2vw, 11px); font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none;
      padding: clamp(5px, 0.8vh, 7px) clamp(4px, 1vw, 14px);
      border-radius: 6px; border: 1px solid var(--border);
      color: var(--text-muted); transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    nav a:hover  { color: var(--text); border-color: #aaa; }
    nav a.active { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }

    .section-content {
      flex: 1; min-height: 0; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-family: var(--font-mono);
      font-size: clamp(11px, 1.5vw, 13px);
      margin-bottom: clamp(6px, 1.2vh, 16px);
    }

    @media (max-width: 480px) { nav a { font-size: 9px; padding: 5px 4px; } }

    /* ── Shared panel styles ── */
    .sig-row   { display: flex; flex-direction: column; gap: 3px; }
    .sig-label { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); line-height: 1.3; }
    .sig-value { font-size: 14px; font-weight: 500; color: var(--text); }
    .sig-pct   { font-size: 10px; color: var(--accent); margin-top: 1px; }
    .sig-divider { border: none; border-top: 1px solid var(--panel-border); margin: 2px 0; }
    .bar-track { height: 3px; background: var(--panel-border); border-radius: 2px; margin-top: 5px; }
    .bar-fill  { height: 3px; border-radius: 2px; transition: width 0.6s ease; }
    .scenario-badge {
      font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: .06em; padding: 3px 7px; border-radius: 4px;
    }
    .scenario-badge.overloaded { color: #dc2626; background: #fee2e2; border: 1px solid #fca5a5; }
    .scenario-badge.balanced   { color: var(--accent); background: var(--accent-light); border: 1px solid #c4b5fd; }
    .scenario-badge.isolated   { color: #d97706; background: #fef3c7; border: 1px solid #fcd34d; }

    #sig-panel.open { max-height: calc(80dvh - 78px) !important; }
    #fc-panel.open  { max-height: calc(50dvh - 78px) !important; }

    /* ── Floating chat styles ── */
    @keyframes fc-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes fc-blink { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
    .fc-wrap { display:flex; flex-direction:column; gap:2px; }
    .fc-wrap.user { align-self:flex-end; align-items:flex-end; }
    .fc-wrap.ai   { align-self:flex-start; align-items:flex-start; }
    .fc-label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); padding:0 2px; }
    .fc-msg { font-size:12px; line-height:1.5; padding:7px 10px; border-radius:6px; border:1px solid var(--border); max-width:90%; }
    .fc-msg.user { background:var(--user-bg); border-color:#c4b5fd; color:var(--text); }
    .fc-msg.ai   { background:var(--surface); color:var(--text); }
    #fc-input:focus { border-color:var(--accent) !important; }
    #fc-send:hover  { opacity:0.85; }
    #fc-send:disabled { opacity:0.35; cursor:not-allowed; }

    @media (max-width:480px) {
      #sig-bar, #sig-panel, #fc-bar, #fc-panel { width:calc(100% - 32px); left:16px; right:auto; }
    }
  </style>

  <!-- ══ Shared scenario module (PR1) ══ -->
  <script src="/scenario.js"></script>
</head>
<body>
  <div class="page-wrapper">
    <div class="section-nav">
      <nav>
        <a href="index.html">Dashboard</a>
        <a href="deep_work_page_2.html" class="active">Deep Work</a>
        <a href="network_page_3.html">Network</a>
        <a href="career_path_page_4.html">Career Path</a>
        <a href="settings_page_5.html">Settings</a>
      </nav>
    </div>
    <div class="section-content">Deep Work — coming soon</div>
  </div>

  <!-- ── Signals bar (bottom-left) ── -->
  <div id="sig-bar" style="
    position:fixed; bottom:16px; left:16px; width:240px; height:38px;
    background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:8px;
    display:flex; align-items:center; gap:8px; padding:0 12px;
    cursor:pointer; z-index:1000; user-select:none;
    box-shadow:0 2px 8px rgba(0,0,0,0.10);
  " onclick="sigToggle()">
    <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Weekly Signals</span>
    <span id="sig-chevron" style="margin-left:auto;font-size:10px;color:var(--text-muted);transition:transform 0.2s;">▲</span>
  </div>

  <div id="sig-panel" style="
    position:fixed; bottom:62px; left:16px; width:240px; max-height:0; overflow:hidden;
    background:transparent; border:1px solid transparent; border-radius:8px;
    z-index:999; transition:max-height 0.28s ease, border-color 0.28s ease, background 0.28s ease;
    display:flex; flex-direction:column;
  ">
    <div style="padding:10px 12px;border-bottom:1px solid var(--panel-border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Weekly Signals</span>
      <span class="scenario-badge" id="sig-scenario">—</span>
    </div>
    <div style="padding:12px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;">
      <div class="sig-row">
        <span class="sig-label">Total meetings</span>
        <span class="sig-value" id="sig-total-meetings">—</span>
      </div>
      <div class="sig-row">
        <span class="sig-label">Meeting time</span>
        <span class="sig-value" id="sig-meeting-time">—</span>
        <span class="sig-pct" id="sig-meeting-pct"></span>
        <div class="bar-track"><div class="bar-fill" id="bar-meeting" style="background:var(--accent);width:0%"></div></div>
      </div>
      <div class="sig-row">
        <span class="sig-label">Back-to-back</span>
        <span class="sig-value" id="sig-b2b">—</span>
      </div>
      <div class="sig-row">
        <span class="sig-label">Focus blocks (60m+)</span>
        <span class="sig-value" id="sig-focus-blocks">—</span>
      </div>
      <hr class="sig-divider"/>
      <div class="sig-row">
        <span class="sig-label">Focus hours</span>
        <span class="sig-value" id="sig-focus-hrs">—</span>
        <span class="sig-pct" id="sig-focus-pct"></span>
        <div class="bar-track"><div class="bar-fill" id="bar-focus" style="width:0%"></div></div>
      </div>
      <div class="sig-row">
        <span class="sig-label">Collab hours</span>
        <span class="sig-value" id="sig-collab-hrs">—</span>
      </div>
    </div>
  </div>

  <!-- ── Floating Coach Chat (bottom-right) ── -->
  <div id="fc-bar" style="
    position:fixed; bottom:16px; right:16px; width:240px; height:38px;
    background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:8px;
    display:flex; align-items:center; gap:8px; padding:0 12px;
    cursor:pointer; z-index:1000; user-select:none;
    box-shadow:0 2px 8px rgba(0,0,0,0.10);
  " onclick="fcToggle()">
    <div id="fc-status-dot" style="width:6px;height:6px;border-radius:50%;background:#f87171;box-shadow:0 0 6px #f87171;animation:fc-pulse 2s ease-in-out infinite;flex-shrink:0;transition:background 0.3s,box-shadow 0.3s;"></div>
    <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Coach</span>
    <span id="fc-chevron" style="margin-left:auto;font-size:10px;color:var(--text-muted);transition:transform 0.2s;">▲</span>
  </div>

  <div id="fc-panel" style="
    position:fixed; bottom:62px; right:16px; width:240px; max-height:0; overflow:hidden;
    background:transparent; border:1px solid transparent; border-radius:8px;
    z-index:999; transition:max-height 0.28s ease, border-color 0.28s ease, background 0.28s ease;
    display:flex; flex-direction:column;
  ">
    <div style="padding:10px 12px;border-bottom:1px solid var(--panel-border);display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <div id="fc-panel-dot" style="width:6px;height:6px;border-radius:50%;background:#f87171;box-shadow:0 0 6px #f87171;animation:fc-pulse 2s ease-in-out infinite;transition:background 0.3s,box-shadow 0.3s;"></div>
      <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Coaching Agent</span>
    </div>
    <div id="fc-messages" style="overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;flex:1;scrollbar-width:thin;scrollbar-color:var(--border) transparent;"></div>
    <div style="padding:8px 12px;border-top:1px solid var(--panel-border);display:flex;gap:6px;align-items:flex-end;flex-shrink:0;">
      <textarea id="fc-input" rows="1" placeholder="Message…" style="flex:1;background:var(--panel-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-ui);font-size:12px;padding:8px 10px;resize:none;min-height:34px;max-height:80px;outline:none;transition:border-color 0.2s;line-height:1.4;"></textarea>
      <button id="fc-send" style="background:var(--accent);border:none;border-radius:6px;color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:500;padding:0 12px;height:34px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity 0.2s;">Send</button>
    </div>
  </div>

  <script>
    // ── Signals ──────────────────────────────────────
    const sigPanel   = document.getElementById('sig-panel');
    const sigChevron = document.getElementById('sig-chevron');
    let sigOpen = sessionStorage.getItem('signals_open') !== 'false';

    function sigApplyState(open) {
      if (open) { sigPanel.classList.add('open'); }
      else { sigPanel.classList.remove('open'); sigPanel.style.maxHeight = '0'; }
      sigPanel.style.borderColor = open ? 'var(--panel-border)' : 'transparent';
      sigPanel.style.background  = open ? 'var(--panel-bg)' : 'transparent';
      sigPanel.style.boxShadow   = open ? '0 2px 8px rgba(0,0,0,0.10)' : 'none';
      sigChevron.style.transform = open ? 'rotate(180deg)' : '';
    }
    function sigToggle() {
      sigOpen = !sigOpen;
      sessionStorage.setItem('signals_open', sigOpen);
      sigApplyState(sigOpen);
    }
    sigApplyState(sigOpen);

    // PR1: signals come from window.signals (set by /scenario.js).
    // The previous date-seeded picker and inline templates were removed.
    function renderSignals() {
      const WEEK_HRS = 40;
      const s = window.signals;
      const meetingHrs = Math.round((s.total_meeting_mins_7d / 60) * 10) / 10;
      const meetingPct = Math.round((meetingHrs / WEEK_HRS) * 100);
      const focusPct   = Math.round((s.focus_hours_7d / WEEK_HRS) * 100);

      const badge = document.getElementById('sig-scenario');
      badge.textContent = window.currentScenario;
      // Reset previous scenario class on re-render so reroll updates colour
      badge.classList.remove('overloaded','balanced','isolated');
      badge.classList.add(window.currentScenario);

      document.getElementById('sig-total-meetings').textContent = s.total_meetings_7d;
      document.getElementById('sig-meeting-time').textContent   = meetingHrs + ' hrs';
      document.getElementById('sig-meeting-pct').textContent    = meetingPct + '% of 9–5 week';
      document.getElementById('bar-meeting').style.width        = Math.min(meetingPct, 100) + '%';
      document.getElementById('sig-b2b').textContent            = s.back_to_back_count + ' occurrence' + (s.back_to_back_count !== 1 ? 's' : '');
      document.getElementById('sig-focus-blocks').textContent   = s.focus_blocks_60min;
      document.getElementById('sig-focus-hrs').textContent      = s.focus_hours_7d + ' hrs';
      document.getElementById('sig-focus-pct').textContent      = focusPct + '% of 9–5 week';
      const barFocus = document.getElementById('bar-focus');
      barFocus.style.width      = Math.min(focusPct, 100) + '%';
      barFocus.style.background = focusPct < 20 ? '#dc2626' : 'var(--accent)';
      document.getElementById('sig-collab-hrs').textContent = s.collab_hours_7d + ' hrs';
    }
    renderSignals();

    // PR1: re-render the signals panel when reroll fires from Settings.
    window.addEventListener('scenariochanged', renderSignals);

    // ── Floating Coach Chat ──────────────────────────
    const HISTORY_KEY = 'coach_history';
    let fcHistory = JSON.parse(sessionStorage.getItem(HISTORY_KEY) || '[]');
    const fcPanel     = document.getElementById('fc-panel');
    const fcMessages  = document.getElementById('fc-messages');
    const fcInput     = document.getElementById('fc-input');
    const fcSend      = document.getElementById('fc-send');
    const fcChevron   = document.getElementById('fc-chevron');
    const fcStatusDot = document.getElementById('fc-status-dot');
    const fcPanelDot  = document.getElementById('fc-panel-dot');

    function fcSaveHistory() { sessionStorage.setItem(HISTORY_KEY, JSON.stringify(fcHistory)); }
    function fcSetConnected(on) {
      const col  = on ? 'var(--accent)' : '#f87171';
      const glow = on ? '0 0 6px var(--accent)' : '0 0 6px #f87171';
      fcStatusDot.style.background = col; fcStatusDot.style.boxShadow = glow;
      fcPanelDot.style.background  = col; fcPanelDot.style.boxShadow  = glow;
    }
    async function fcCheckConnection() {
      try {
        const res = await fetch('/api/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: '__ping__', history: [] }),
        });
        if (res.ok) fcSetConnected(true);
      } catch (err) { fcSetConnected(false); }
    }
    fcCheckConnection();

    function fcApplyState(open) {
      if (open) { fcPanel.classList.add('open'); }
      else { fcPanel.classList.remove('open'); fcPanel.style.maxHeight = '0'; }
      fcPanel.style.borderColor = open ? 'var(--panel-border)' : 'transparent';
      fcPanel.style.background  = open ? 'var(--panel-bg)' : 'transparent';
      fcPanel.style.boxShadow   = open ? '0 2px 8px rgba(0,0,0,0.10)' : 'none';
      fcChevron.style.transform = open ? 'rotate(180deg)' : '';
    }
    function fcRenderMessage(role, text) {
      const wrap  = document.createElement('div'); wrap.className = 'fc-wrap ' + (role === 'user' ? 'user' : 'ai');
      const label = document.createElement('div'); label.className = 'fc-label';
      label.textContent = role === 'user' ? 'You' : 'Coach';
      const msg   = document.createElement('div'); msg.className = 'fc-msg ' + (role === 'user' ? 'user' : 'ai');
      msg.textContent = text;
      wrap.appendChild(label); wrap.appendChild(msg);
      fcMessages.appendChild(wrap); fcMessages.scrollTop = fcMessages.scrollHeight;
    }
    function fcToggle() {
      fcHistory = JSON.parse(sessionStorage.getItem(HISTORY_KEY) || '[]');
      const fcOpen = sessionStorage.getItem('coach_open') !== 'false';
      const newOpen = !fcOpen;
      sessionStorage.setItem('coach_open', newOpen);
      fcApplyState(newOpen);
      if (newOpen) {
        fcMessages.innerHTML = '';
        fcHistory.forEach(m => fcRenderMessage(m.role === 'user' ? 'user' : 'ai', m.content));
        setTimeout(() => fcInput.focus(), 300);
      }
    }
    fcInput.addEventListener('input', () => {
      fcInput.style.height = 'auto';
      fcInput.style.height = Math.min(fcInput.scrollHeight, 80) + 'px';
    });
    fcInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); fcSendMessage(); }
    });
    fcSend.addEventListener('click', fcSendMessage);

    async function fcSendMessage() {
      const text = fcInput.value.trim();
      if (!text) return;
      fcInput.value = ''; fcInput.style.height = 'auto'; fcSend.disabled = true;
      fcRenderMessage('user', text);
      const typingWrap = document.createElement('div');
      typingWrap.className = 'fc-wrap ai'; typingWrap.id = 'fc-typing';
      typingWrap.innerHTML = '<div class="fc-label">Coach</div><div class="fc-msg ai" style="display:flex;gap:4px;align-items:center;"><span style="width:5px;height:5px;border-radius:50%;background:var(--accent);animation:fc-blink 1.2s ease-in-out infinite;display:inline-block;"></span><span style="width:5px;height:5px;border-radius:50%;background:var(--accent);animation:fc-blink 1.2s ease-in-out 0.2s infinite;display:inline-block;"></span><span style="width:5px;height:5px;border-radius:50%;background:var(--accent);animation:fc-blink 1.2s ease-in-out 0.4s infinite;display:inline-block;"></span></div>';
      fcMessages.appendChild(typingWrap); fcMessages.scrollTop = fcMessages.scrollHeight;
      try {
        const res = await fetch('/api/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            history: fcHistory,
            scenario: window.currentScenario,    // PR1: tell the API which scenario we're on
          }),
        });
        const data = await res.json();
        document.getElementById('fc-typing')?.remove();
        fcSetConnected(true);
        if (data.error) { fcRenderMessage('ai', 'Error: ' + data.error); }
        else {
          fcRenderMessage('ai', data.reply);
          fcHistory.push({ role: 'user',  content: text });
          fcHistory.push({ role: 'coach', content: data.reply });
          fcSaveHistory();
        }
      } catch (err) {
        document.getElementById('fc-typing')?.remove();
        fcSetConnected(false);
        fcRenderMessage('ai', 'Could not reach the server.');
      } finally { fcSend.disabled = false; fcInput.focus(); }
    }

    const initOpen = sessionStorage.getItem('coach_open') !== 'false';
    fcApplyState(initOpen);
    if (initOpen) {
      fcHistory.forEach(m => fcRenderMessage(m.role === 'user' ? 'user' : 'ai', m.content));
    }
  </script>
</body>
</html>
