<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text: #1a1a2e;
      --text-muted: #8888aa;
      --bg: #979797;
      --surface: #ffffff;
      --border: #dcdcec;
      --accent: #7c3aed;
      --accent-dim: #7c3aed18;
      --accent-light: #ede9fe;
      --user-bg: #ede9fe;
      --ai-bg: #f8f8fc;
      --panel-bg: #e4e4ef;
      --panel-border: #c8c8de;
      --radius: 10px;
      --font-ui: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    body {
      background: url('/KCS_Arch_COPYRIGHT.jpg') center/cover no-repeat fixed, var(--bg);
      color: var(--text); font-family: var(--font-ui);
      height: 100dvh; display: flex; overflow: hidden;
    }

    .page-wrapper {
      flex: 1; min-width: 0; height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 clamp(8px, 2vw, 16px);
      gap: clamp(6px, 1.2vh, 12px);
      overflow: hidden;
    }

    .section-nav {
      flex-shrink: 0; width: 100%; max-width: 720px;
      padding: clamp(10px, 2vh, 20px) 0 0;
    }
    nav { display: flex; gap: clamp(4px, 0.8vw, 8px); }
    nav a {
      background: var(--surface); flex: 1; text-align: center;
      font-family: var(--font-mono); font-size: clamp(9px, 1.2vw, 11px); font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none;
      padding: clamp(5px, 0.8vh, 7px) clamp(4px, 1vw, 14px);
      border-radius: 6px; border: 1px solid var(--border);
      color: var(--text-muted); transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    nav a:hover  { color: var(--text); border-color: #aaa; }
    nav a.active { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }

    .section-chat {
      flex: 1; min-height: 0; width: 100%; max-width: 720px;
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      margin-bottom: clamp(6px, 1.2vh, 16px);
    }
    .chat-header {
      padding: clamp(10px, 1.5vh, 14px) 16px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      background: var(--surface);
    }
    .header-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #f87171; box-shadow: 0 0 6px #f87171;
      animation: pulse 2s ease-in-out infinite;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .header-dot.connected { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .chat-header h1 {
      font-family: var(--font-mono); font-size: 13px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted);
    }
    .chat-header span {
      margin-left: auto; font-family: var(--font-mono); font-size: 11px;
      color: var(--accent); background: var(--accent-light);
      padding: 3px 8px; border-radius: 4px; border: 1px solid #c4b5fd;
    }
    #chat-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 16px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      background: var(--ai-bg);
    }
    .message { display: flex; flex-direction: column; gap: 4px; max-width: 85%; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.ai   { align-self: flex-start; align-items: flex-start; }
    .message-label {
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); padding: 0 4px;
    }
    .message-bubble {
      padding: 12px 16px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.6; border: 1px solid var(--border);
    }
    .message.user .message-bubble { background: var(--user-bg); border-color: #c4b5fd; color: var(--text); }
    .message.ai   .message-bubble { background: var(--surface); color: var(--text); }
    .typing-indicator {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius); width: fit-content;
    }
    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); opacity: 0.4; animation: blink 1.2s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2){animation-delay:0.2s}
    .typing-indicator span:nth-child(3){animation-delay:0.4s}
    @keyframes blink { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; color: var(--text-muted); font-family: var(--font-mono); font-size: 13px;
    }
    .empty-state svg { opacity: 0.2; margin-bottom: 8px; }
    .chat-input-area {
      padding: 12px 16px; border-top: 1px solid var(--border);
      flex-shrink: 0; background: var(--surface);
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #user-input {
      flex: 1; background: var(--panel-bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-family: var(--font-ui); font-size: 14px;
      padding: 12px 16px; resize: none; min-height: 48px; max-height: 140px;
      outline: none; transition: border-color 0.2s; line-height: 1.5;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-muted); }
    #send-btn {
      background: var(--accent); border: none; border-radius: var(--radius);
      color: #fff; font-family: var(--font-mono); font-size: 13px; font-weight: 500;
      padding: 0 20px; height: 48px; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s; white-space: nowrap; flex-shrink: 0;
    }
    #send-btn:hover   { opacity: 0.85; }
    #send-btn:active  { transform: scale(0.97); }
    #send-btn:disabled{ opacity: 0.35; cursor: not-allowed; }
    .hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-family: var(--font-mono); }

    @media (max-width: 480px) {
      .chat-header h1 { font-size: 11px; }
      .message-bubble { font-size: 13px; }
      #send-btn { padding: 0 12px; font-size: 12px; }
      .hint { display: none; }
    }

    /* ── Signals floating panel ── */
    .sig-row   { display: flex; flex-direction: column; gap: 3px; }
    .sig-label { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); line-height: 1.3; }
    .sig-value { font-size: 14px; font-weight: 500; color: var(--text); }
    .sig-pct   { font-size: 10px; color: var(--accent); margin-top: 1px; }
    .sig-divider { border: none; border-top: 1px solid var(--panel-border); margin: 2px 0; }
    .bar-track { height: 3px; background: var(--panel-border); border-radius: 2px; margin-top: 5px; }
    .bar-fill  { height: 3px; border-radius: 2px; transition: width 0.6s ease; }
    .scenario-badge {
      font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: .06em; padding: 3px 7px; border-radius: 4px;
    }
    .scenario-badge.overloaded { color: #dc2626; background: #fee2e2; border: 1px solid #fca5a5; }
    .scenario-badge.balanced   { color: var(--accent); background: var(--accent-light); border: 1px solid #c4b5fd; }
    .scenario-badge.isolated   { color: #d97706; background: #fef3c7; border: 1px solid #fcd34d; }
    #sig-panel.open { max-height: calc(80dvh - 78px) !important; }

    @media (max-width: 480px) {
      #sig-bar, #sig-panel { width: calc(100% - 32px); left: 16px; }
    }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <div class="section-nav">
      <nav>
        <a href="index.html" class="active">Dashboard</a>
        <a href="deep_work_page_2.html">Deep Work</a>
        <a href="network_page_3.html">Network</a>
        <a href="career_path_page_4.html">Career Path</a>
        <a href="settings_page_5.html">Settings</a>
      </nav>
    </div>

    <div class="section-chat">
      <div class="chat-header">
        <div class="header-dot" id="status-dot"></div>
        <h1>Coaching Agent</h1>
        <span>GPT-4o</span>
      </div>
      <div id="chat-messages">
        <div class="empty-state" id="empty-state">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Start a conversation
        </div>
      </div>
      <div class="chat-input-area">
        <div class="input-row">
          <textarea id="user-input" placeholder="Type a message…" rows="1"></textarea>
          <button id="send-btn">Send →</button>
        </div>
        <div class="hint">Press Enter to send · Shift+Enter for new line</div>
      </div>
    </div>
  </div>

  <!-- ── Signals bar (bottom-left) ── -->
  <div id="sig-bar" style="
    position:fixed; bottom:16px; left:16px; width:240px; height:38px;
    background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:8px;
    display:flex; align-items:center; gap:8px; padding:0 12px;
    cursor:pointer; z-index:1000; user-select:none;
    box-shadow:0 2px 8px rgba(0,0,0,0.10);
  " onclick="sigToggle()">
    <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Weekly Signals</span>
    <span id="sig-chevron" style="margin-left:auto;font-size:10px;color:var(--text-muted);transition:transform 0.2s;">▲</span>
  </div>

  <div id="sig-panel" style="
    position:fixed; bottom:62px; left:16px; width:240px; max-height:0; overflow:hidden;
    background:transparent; border:1px solid transparent; border-radius:8px;
    z-index:999; transition:max-height 0.28s ease, border-color 0.28s ease, background 0.28s ease;
    display:flex; flex-direction:column;
  ">
    <div style="padding:10px 12px;border-bottom:1px solid var(--panel-border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);">Weekly Signals</span>
      <span class="scenario-badge" id="sig-scenario">—</span>
    </div>
    <div style="padding:12px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;">
      <div class="sig-row">
        <span class="sig-label">Total meetings</span>
        <span class="sig-value" id="sig-total-meetings">—</span>
      </div>
      <div class="sig-row">
        <span class="sig-label">Meeting time</span>
        <span class="sig-value" id="sig-meeting-time">—</span>
        <span class="sig-pct" id="sig-meeting-pct"></span>
        <div class="bar-track"><div class="bar-fill" id="bar-meeting" style="background:var(--accent);width:0%"></div></div>
      </div>
      <div class="sig-row">
        <span class="sig-label">Back-to-back</span>
        <span class="sig-value" id="sig-b2b">—</span>
      </div>
      <div class="sig-row">
        <span class="sig-label">Focus blocks (60m+)</span>
        <span class="sig-value" id="sig-focus-blocks">—</span>
      </div>
      <hr class="sig-divider"/>
      <div class="sig-row">
        <span class="sig-label">Focus hours</span>
        <span class="sig-value" id="sig-focus-hrs">—</span>
        <span class="sig-pct" id="sig-focus-pct"></span>
        <div class="bar-track"><div class="bar-fill" id="bar-focus" style="width:0%"></div></div>
      </div>
      <div class="sig-row">
        <span class="sig-label">Collab hours</span>
        <span class="sig-value" id="sig-collab-hrs">—</span>
      </div>
    </div>
  </div>

  <script>
    // ── Signals ──────────────────────────────────────
    const sigPanel   = document.getElementById('sig-panel');
    const sigChevron = document.getElementById('sig-chevron');
    let sigOpen = sessionStorage.getItem('signals_open') !== 'false';

    function sigApplyState(open) {
      if (open) { sigPanel.classList.add('open'); }
      else { sigPanel.classList.remove('open'); sigPanel.style.maxHeight = '0'; }
      sigPanel.style.borderColor = open ? 'var(--panel-border)' : 'transparent';
      sigPanel.style.background  = open ? 'var(--panel-bg)' : 'transparent';
      sigPanel.style.boxShadow   = open ? '0 2px 8px rgba(0,0,0,0.10)' : 'none';
      sigChevron.style.transform = open ? 'rotate(180deg)' : '';
    }
    function sigToggle() {
      sigOpen = !sigOpen;
      sessionStorage.setItem('signals_open', sigOpen);
      sigApplyState(sigOpen);
    }
    sigApplyState(sigOpen);

    (function populateSignals() {
      const WEEK_HRS = 40;
      const d = new Date();
      const seed = d.getFullYear() * 365 + d.getMonth() * 31 + d.getDate();
      function sr(n) { const x = Math.sin(seed * 9301 + n * 49297 + 233) * 73214; return x - Math.floor(x); }
      const scenarios = ['overloaded', 'balanced', 'isolated'];
      const scenario  = scenarios[Math.floor(sr(0) * 3)];
      const ri = (mn, mx, n) => Math.floor(sr(n) * (mx - mn + 1)) + mn;
      const rf = (mn, mx, n) => Math.round((sr(n) * (mx - mn) + mn) * 10) / 10;
      const templates = {
        overloaded: { total_meetings_7d: ri(18,26,1), total_meeting_mins_7d: ri(900,1200,2), back_to_back_count: ri(7,12,3), focus_blocks_60min: ri(0,2,4),   focus_hours_7d: rf(1.5,4.0,5),   collab_hours_7d: rf(16.0,22.0,6) },
        balanced:   { total_meetings_7d: ri(8,14,1),  total_meeting_mins_7d: ri(400,600,2),  back_to_back_count: ri(1,4,3),  focus_blocks_60min: ri(5,9,4),   focus_hours_7d: rf(10.0,15.0,5), collab_hours_7d: rf(6.0,12.0,6) },
        isolated:   { total_meetings_7d: ri(1,4,1),   total_meeting_mins_7d: ri(40,120,2),   back_to_back_count: 0,          focus_blocks_60min: ri(10,18,4), focus_hours_7d: rf(22.0,32.0,5), collab_hours_7d: rf(0.5,2.0,6) },
      };
      const s = { scenario, ...templates[scenario] };
      const meetingHrs = Math.round((s.total_meeting_mins_7d / 60) * 10) / 10;
      const meetingPct = Math.round((meetingHrs / WEEK_HRS) * 100);
      const focusPct   = Math.round((s.focus_hours_7d / WEEK_HRS) * 100);
      const badge = document.getElementById('sig-scenario');
      badge.textContent = scenario; badge.classList.add(scenario);
      document.getElementById('sig-total-meetings').textContent = s.total_meetings_7d;
      document.getElementById('sig-meeting-time').textContent   = meetingHrs + ' hrs';
      document.getElementById('sig-meeting-pct').textContent    = meetingPct + '% of 9–5 week';
      document.getElementById('bar-meeting').style.width        = Math.min(meetingPct, 100) + '%';
      document.getElementById('sig-b2b').textContent            = s.back_to_back_count + ' occurrence' + (s.back_to_back_count !== 1 ? 's' : '');
      document.getElementById('sig-focus-blocks').textContent   = s.focus_blocks_60min;
      document.getElementById('sig-focus-hrs').textContent      = s.focus_hours_7d + ' hrs';
      document.getElementById('sig-focus-pct').textContent      = focusPct + '% of 9–5 week';
      const barFocus = document.getElementById('bar-focus');
      barFocus.style.width      = Math.min(focusPct, 100) + '%';
      barFocus.style.background = focusPct < 20 ? '#dc2626' : 'var(--accent)';
      document.getElementById('sig-collab-hrs').textContent = s.collab_hours_7d + ' hrs';
    })();

    // ── Chat ─────────────────────────────────────────
    const HISTORY_KEY = 'coach_history';
    const messagesEl  = document.getElementById('chat-messages');
    const inputEl     = document.getElementById('user-input');
    const sendBtn     = document.getElementById('send-btn');
    const emptyState  = document.getElementById('empty-state');
    const statusDot   = document.getElementById('status-dot');
    let history = JSON.parse(sessionStorage.getItem(HISTORY_KEY) || '[]');
    function saveHistory() { sessionStorage.setItem(HISTORY_KEY, JSON.stringify(history)); }

    async function checkConnection() {
      try {
        const res = await fetch('/api/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: '__ping__', history: [] }),
        });
        if (res.ok) statusDot.classList.add('connected');
      } catch (_) {}
    }
    checkConnection();

    function renderMessage(role, text) {
      emptyState?.remove();
      const wrap = document.createElement('div'); wrap.className = `message ${role}`;
      const label = document.createElement('div'); label.className = 'message-label';
      label.textContent = role === 'user' ? 'You' : 'Coach';
      const bubble = document.createElement('div'); bubble.className = 'message-bubble';
      bubble.textContent = text;
      wrap.appendChild(label); wrap.appendChild(bubble);
      messagesEl.appendChild(wrap); messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }
    history.forEach(m => renderMessage(m.role === 'user' ? 'user' : 'ai', m.content));
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    });
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    sendBtn.addEventListener('click', sendMessage);

    function showTyping() {
      const wrap = document.createElement('div'); wrap.className = 'message ai'; wrap.id = 'typing';
      const label = document.createElement('div'); label.className = 'message-label'; label.textContent = 'COACH';
      const ind = document.createElement('div'); ind.className = 'typing-indicator';
      ind.innerHTML = '<span></span><span></span><span></span>';
      wrap.appendChild(label); wrap.appendChild(ind);
      messagesEl.appendChild(wrap); messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    function removeTyping() { document.getElementById('typing')?.remove(); }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = ''; inputEl.style.height = 'auto'; sendBtn.disabled = true;
      renderMessage('user', text); showTyping();
      try {
        const res = await fetch('/api/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history }),
        });
        const data = await res.json();
        removeTyping(); statusDot.classList.add('connected');
        if (data.error) { renderMessage('ai', `Error: ${data.error}`); }
        else {
          renderMessage('ai', data.reply);
          history.push({ role: 'user', content: text });
          history.push({ role: 'coach', content: data.reply });
          saveHistory();
        }
      } catch (_) {
        removeTyping(); statusDot.classList.remove('connected');
        renderMessage('ai', 'Could not reach the server.');
      } finally { sendBtn.disabled = false; inputEl.focus(); }
    }
  </script>
</body>
</html>
